<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>meinong's game room</title>
    <link rel="icon" type="image/png" href="./assets/go%20table%20%28both%20closed%29.png" />
    <link rel="stylesheet" href="./styles.css?v=20260327a" />
  </head>
  <body>
    <main class="home-shell">
      <section class="home-card" aria-label="Room setup">
        <h1>meinong's game room</h1>
        <div class="home-profile-row">
          <input
            id="playerName"
            class="home-name-input"
            name="playerName"
            type="text"
            maxlength="24"
            placeholder="enter name (optional)"
            autocomplete="name"
          />
          <label class="home-color-wrap" for="playerColor" title="cursor color">
            <input
              id="playerColor"
              class="home-color-input"
              name="playerColor"
              type="color"
              value="#ff7a59"
              aria-label="cursor color"
            />
          </label>
        </div>
        <button id="createRoomButton" class="primary-button" type="button">
          generate new tabletop
        </button>
        <div class="home-actions-grid">
          <button id="myGamesButton" class="secondary-button" type="button">my games</button>
          <button id="lastGameButton" class="secondary-button" type="button">last game</button>
        </div>
      </section>
    </main>

    <script type="module" src="./app-home.js?v=20260327a"></script>
  </body>
</html>
